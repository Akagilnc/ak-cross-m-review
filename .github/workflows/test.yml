name: test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test deps
        run: python -m pip install --upgrade pip pytest pytest-cov
      - name: pytest (extract_json + codex-review degrade)
        run: pytest
      - name: codex-review.sh selftest (invocation-form regression guard)
        run: bash backends/codex-review.sh --selftest
