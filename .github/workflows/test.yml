name: test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test deps
        run: python -m pip install --upgrade pip pytest pytest-cov
      - name: pytest (lib unit tests)
        run: pytest
      - name: selftest battery (deterministic core)
        run: |
          python3 lib/merge.py --selftest
          python3 lib/drift.py --selftest
          bash backends/codex-review.sh --selftest
